<!DOCTYPE html>
<html lang="en" data-theme="morning">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BusTech · Demo 01</title>
  <meta name="theme-color" content="#0a84ff" />
  <meta name="description" content="A calm transit companion — live arrivals, neighbourhood weather and an on-device platform monitor." />

  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/logo-mark.png" />

  <!-- Leaflet (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/weather-fx.css" />
</head>
<body>
  <!-- time-of-day wallpapers (cross-fade) -->
  <div id="wallpaper">
    <div class="wp-layer" data-wp="dawn" style="background-image:url('assets/wallpapers/dawn.jpg')"></div>
    <div class="wp-layer" data-wp="morning" style="background-image:url('assets/wallpapers/morning.jpg')"></div>
    <div class="wp-layer" data-wp="dusk" style="background-image:url('assets/wallpapers/dusk.jpg')"></div>
    <div class="wp-layer" data-wp="night" style="background-image:url('assets/wallpapers/night.jpg')"></div>
  </div>

  <!-- full-app weather atmosphere (rain/wind), toggled on wet conditions -->
  <div id="sky-fx" aria-hidden="true"></div>

  <div id="app">
    <header class="topbar">
      <div class="wrap">
        <div class="topbar-inner">
          <a class="brand">
            <img class="brand-logo" src="assets/logo-mark.png" alt="BusTech" width="34" height="34" />
            <span class="brand-text">
              <span class="brand-name">BusTech</span>
              <span class="brand-tag">Demo 01</span>
            </span>
          </a>
          <nav class="top-nav">
            <a class="top-link" data-route="home" data-nav="home"><i data-lucide="house"></i><span class="lbl">Home</span></a>
            <a class="top-link" data-route="monitor" data-nav="monitor"><i data-lucide="scan-line"></i><span class="lbl">Monitor</span></a>
            <span class="theme-pill" id="theme-pill"><i data-lucide="sun"></i><span class="lbl">Morning</span></span>
          </nav>
        </div>
      </div>
    </header>

    <main id="main"></main>
  </div>

  <div id="toast"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#8aa0ff"/><stop offset="1" stop-color="#e173c4"/>
      </linearGradient></defs>
      <rect width="100" height="100" fill="url(#g)"/>
      <g fill="#fff"><rect x="33" y="31" width="34" height="33" rx="7"/>
      <circle cx="41" cy="67" r="4"/><circle cx="59" cy="67" r="4"/>
      <rect x="38" y="36" width="24" height="12" rx="3" fill="#8aa0ff"/></g>
    </svg>
  </template>

  <!-- libraries -->
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <!-- TensorFlow.js + COCO-SSD lazy-load in js/crowd.js only on the Monitor page -->

  <script src="js/theme.js"></script>
  <script src="js/data.js"></script>
  <script src="js/vfs.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/tips.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/weatherAnim.js"></script>
  <script src="js/skyfx.js"></script>
  <script src="js/busApi.js"></script>
  <script src="js/location.js"></script>
  <script src="js/monitor-engine.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/station.js"></script>
  <script src="js/pages/monitor.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
